<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Midnight Archive library</title><desc id="desc">A restrained dark reading archive with saved articles arranged in a typographic grid.</desc>
  <rect width="1600" height="1000" fill="#111113"/><text x="70" y="86" fill="#f2efea" font-family="Georgia,serif" font-size="34">Midnight Archive</text><text x="1285" y="80" fill="#938c87" font-family="monospace" font-size="14">184 SAVED / 12 UNREAD</text><line x1="70" y1="120" x2="1530" y2="120" stroke="#45434a"/>
  <text x="70" y="205" fill="#8b8cff" font-family="monospace" font-size="14">THE READING SHELF</text><text x="70" y="275" fill="#f2efea" font-family="Georgia,serif" font-size="64">Things worth keeping<br/>after the tab closes.</text>
  <g transform="translate(70 410)"><rect width="430" height="430" fill="#1b1b1f"/><rect x="28" y="28" width="374" height="190" fill="#2d2c34"/><circle cx="115" cy="112" r="55" fill="#8b8cff"/><path d="M210 75h150M210 110h120M210 145h145" stroke="#bab3ad" stroke-width="9"/><text x="28" y="270" fill="#938c87" font-family="monospace" font-size="13">ARCHITECTURE / 18 MIN</text><text x="28" y="315" fill="#f2efea" font-family="Georgia,serif" font-size="30">When infrastructure<br/>becomes culture</text><text x="28" y="395" fill="#bab3ad" font-family="system-ui" font-size="15">Saved 4 days ago</text></g>
  <g transform="translate(535 410)"><rect width="430" height="430" fill="#18181b" stroke="#34333a"/><text x="28" y="60" fill="#938c87" font-family="monospace" font-size="13">DESIGN / 24 MIN</text><text x="28" y="125" fill="#f2efea" font-family="Georgia,serif" font-size="34">A field guide to<br/>quiet software</text><path d="M28 190h330M28 220h280M28 250h350M28 280h310M28 310h345" stroke="#4b4952" stroke-width="8"/><text x="28" y="395" fill="#bab3ad" font-family="system-ui" font-size="15">3 notes · Saved last week</text></g>
  <g transform="translate(1000 410)"><rect width="530" height="430" fill="#8b8cff"/><text x="32" y="65" fill="#111113" font-family="monospace" font-size="13">NETWORKS / 31 MIN</text><text x="32" y="142" fill="#111113" font-family="Georgia,serif" font-size="42">The small network<br/>is still a place.</text><path d="M35 245h420M35 280h360M35 315h395" stroke="#33334d" stroke-width="10"/><text x="32" y="395" fill="#252538" font-family="system-ui" font-size="15">Unread · Captured perfectly</text></g>
</svg>
