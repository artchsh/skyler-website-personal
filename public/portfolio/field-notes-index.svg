<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Field Notes Archive index</title><desc id="desc">A pale research archive interface with filters, search results, and specimen-inspired accents.</desc>
  <rect width="1600" height="1000" fill="#e7e3d8"/><rect x="0" y="0" width="1600" height="105" fill="#1c332c"/><text x="55" y="66" fill="#f0ede4" font-family="Georgia,serif" font-size="30">Field Notes Archive</text><text x="1250" y="62" fill="#c7d3c8" font-family="monospace" font-size="14">MAP  INDEX  ABOUT</text>
  <text x="55" y="190" fill="#1c332c" font-family="Georgia,serif" font-size="58">Research, returned<br/>to the field.</text><rect x="900" y="145" width="640" height="74" fill="#f4f1e9" stroke="#777e76"/><text x="935" y="191" fill="#6b716c" font-family="system-ui" font-size="20">Search 2,418 records…</text>
  <line x1="55" y1="275" x2="1545" y2="275" stroke="#999b93"/><g font-family="monospace" font-size="14"><text x="55" y="330" fill="#1c332c">FILTER BY</text><text x="55" y="390" fill="#555b56">REGION</text><text x="55" y="435" fill="#555b56">HABITAT</text><text x="55" y="480" fill="#555b56">METHOD</text><text x="55" y="525" fill="#555b56">YEAR</text></g>
  <g transform="translate(345 325)"><text fill="#747a73" font-family="monospace" font-size="13">REPORT / WETLAND / 2024</text><text y="50" fill="#1c332c" font-family="Georgia,serif" font-size="34">Seasonal water systems of the lower steppe</text><text y="90" fill="#555b56" font-family="system-ui" font-size="16">A five-year field record of temporary lakes and their surrounding plant communities.</text><line y1="130" x2="1200" y2="130" stroke="#aaa99f"/></g>
  <g transform="translate(345 515)"><text fill="#747a73" font-family="monospace" font-size="13">DATASET / FOREST EDGE / 2023</text><text y="50" fill="#1c332c" font-family="Georgia,serif" font-size="34">Acoustic observations after dusk</text><text y="90" fill="#555b56" font-family="system-ui" font-size="16">1,820 recordings, annotated by habitat and confidence.</text><line y1="130" x2="1200" y2="130" stroke="#aaa99f"/></g>
  <g transform="translate(345 705)"><text fill="#747a73" font-family="monospace" font-size="13">FIELD NOTE / ALPINE / 2022</text><text y="50" fill="#1c332c" font-family="Georgia,serif" font-size="34">Small signs above the tree line</text><text y="90" fill="#555b56" font-family="system-ui" font-size="16">An illustrated survey of seasonal movement at three elevations.</text><line y1="130" x2="1200" y2="130" stroke="#aaa99f"/></g><circle cx="130" cy="790" r="52" fill="#8b8cff"/><path d="M100 790h60M130 760v60" stroke="#1c332c" stroke-width="5"/>
</svg>
