<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Virtual Gamepad settings</title>
  <desc id="desc">A dark iPhone settings sheet for entering the local server address, port, and connection state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#121216"/><stop offset="1" stop-color="#282832"/></linearGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="160%"><feDropShadow dy="30" stdDeviation="28" flood-opacity=".5"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text x="132" y="126" fill="#8b8cff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="24" letter-spacing="3">LOCAL CONNECTION</text>
  <text x="132" y="180" fill="#f4f2ed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="52" font-weight="750">Simple setup, no Python required.</text>
  <g filter="url(#shadow)">
    <rect x="445" y="235" width="710" height="610" rx="54" fill="#09090b" stroke="#4d4d58" stroke-width="4"/>
    <rect x="468" y="258" width="664" height="564" rx="36" fill="#19191e"/>
  </g>
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <text x="520" y="325" fill="#f4f2ed" font-size="34" font-weight="700">Settings</text>
    <text x="1068" y="325" fill="#8b8cff" font-size="24" text-anchor="end">Save</text>
    <text x="520" y="382" fill="#90909b" font-size="18" letter-spacing="1.5">SERVER CONFIGURATION</text>
    <rect x="500" y="405" width="600" height="142" rx="20" fill="#24242a"/>
    <text x="530" y="453" fill="#f4f2ed" font-size="22">Server IP</text><text x="1070" y="453" fill="#b9b9c2" font-size="22" text-anchor="end">192.168.1.39</text>
    <line x1="530" y1="476" x2="1070" y2="476" stroke="#3f3f48"/>
    <text x="530" y="521" fill="#f4f2ed" font-size="22">Port</text><text x="1070" y="521" fill="#b9b9c2" font-size="22" text-anchor="end">8000</text>
    <text x="520" y="604" fill="#90909b" font-size="18" letter-spacing="1.5">CONNECTION</text>
    <rect x="500" y="626" width="600" height="74" rx="20" fill="#24242a"/>
    <text x="530" y="672" fill="#8b8cff" font-size="22">Connect</text>
    <path d="M1036 660h31m-16-15 16 15-16 15" fill="none" stroke="#8b8cff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="520" y="755" fill="#90909b" font-size="18" letter-spacing="1.5">STATUS</text>
    <circle cx="1055" cy="780" r="7" fill="#ef5964"/><text x="1075" y="788" fill="#ef7a83" font-size="20" text-anchor="end">Disconnected</text>
  </g>
  <g transform="translate(130 332)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <text fill="#92929e" font-size="20">WINDOWS SERVER</text>
    <text y="46" fill="#f4f2ed" font-size="28" font-weight="700">remote-controller-server.exe</text>
    <text y="93" fill="#92929e" font-size="21">FastAPI + vgamepad + ViGEm</text>
    <path d="M0 142h220" stroke="#8b8cff" stroke-width="3"/>
    <text y="190" fill="#f4f2ed" font-size="21">01  Run executable</text>
    <text y="235" fill="#f4f2ed" font-size="21">02  Enter local IP</text>
    <text y="280" fill="#f4f2ed" font-size="21">03  Start playing</text>
  </g>
</svg>
