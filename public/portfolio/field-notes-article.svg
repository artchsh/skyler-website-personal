<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Field Notes Archive article</title><desc id="desc">A long-form research article layout with marginal notes, a chart, and generous reading space.</desc>
  <rect width="1600" height="1000" fill="#f0ede4"/><text x="45" y="65" fill="#1c332c" font-family="Georgia,serif" font-size="24">Field Notes Archive</text><text x="1325" y="60" fill="#657069" font-family="monospace" font-size="13">REPORT 0184</text><line x1="45" y1="95" x2="1555" y2="95" stroke="#9ca098"/>
  <text x="330" y="190" fill="#68716b" font-family="monospace" font-size="14">WETLAND SYSTEMS / 2019—2024</text><text x="330" y="270" fill="#1c332c" font-family="Georgia,serif" font-size="58">Seasonal water systems<br/>of the lower steppe</text><text x="330" y="335" fill="#59615c" font-family="system-ui" font-size="19">A five-year field record by A. Karimova and the watershed group.</text>
  <g transform="translate(330 430)"><path d="M0 250C90 170 150 220 240 120S410 70 500 160 650 160 760 55" fill="none" stroke="#1c332c" stroke-width="5"/><path d="M0 280h760M0 0v280" stroke="#858c86"/><g fill="#8b8cff"><circle cx="240" cy="120" r="9"/><circle cx="500" cy="160" r="9"/><circle cx="760" cy="55" r="9"/></g><text x="0" y="320" fill="#68716b" font-family="monospace" font-size="13">WATER COVER / OBSERVED HECTARES / 60 MONTHS</text></g>
  <g fill="#59615c" font-family="Georgia,serif" font-size="19"><text x="330" y="825">The temporary lakes do not disappear so much as move through a</text><text x="330" y="857">sequence of visible and invisible states. Reading them requires a</text><text x="330" y="889">longer memory than a single season can provide.</text></g>
  <rect x="1180" y="430" width="330" height="220" fill="#dce1d9"/><text x="1210" y="475" fill="#1c332c" font-family="monospace" font-size="13">MARGINAL NOTE 04</text><text x="1210" y="530" fill="#1c332c" font-family="Georgia,serif" font-size="20">Compare the 2022 basin<br/>survey before citing this<br/>measurement.</text><text x="1210" y="615" fill="#68716b" font-family="monospace" font-size="12">CORRECTION ADDED 2025</text>
</svg>
